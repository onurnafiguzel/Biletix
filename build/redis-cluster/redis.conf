# Shared config for every Biletix Redis Cluster node (redis-c1..c6).
# The per-node identity (cluster-announce-ip) is passed on the command line in
# docker-compose.yml because it differs per node; everything common lives here.

port 6379

# Turn this node into a cluster member. Without this it is a plain standalone Redis
# and `redis-cli --cluster create` would refuse it.
cluster-enabled yes

# Where the node persists the cluster topology it has learned (which slots it owns,
# who the other nodes are, master/replica links). Lives in /data (a named volume),
# so the cluster survives restarts. Paired with static IPs this stays valid across up/down.
cluster-config-file nodes.conf

# How long (ms) a node may be unreachable before peers consider it failing and a
# replica failover election can start. 5s is a sane lab value.
cluster-node-timeout 5000

# Append-only persistence. Not strictly needed for our advisory, TTL'd locks, but it
# is how you would actually run a cluster — and it keeps the demo honest.
appendonly yes
